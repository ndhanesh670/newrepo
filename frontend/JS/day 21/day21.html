<script>
    //1 to 10
    for (let i = 1; i <= 10; i++) {
        console.log(i)
    }

    //10 to 1
    for (let i = 10; i >= 1; i--) {
        console.log(i)
    }

    //prime even numbers between 1 to 20
    for (let i = 1; i <= 20; i++) {
        let isPrime = true;
        for (let j = 2; j <= Math.sqrt(i); j++) {
            if (i > 1 && i % j === 0) {
                isPrime = false;
                break;
            }
        }
        if (isPrime) {
            console.log(i + " is a prime number");
        }
    }

    //sum of 1 tp 10
    let sum = 0;
    for (let i = 1; i <= 10; i++) {
        sum += i;
    }
    console.log("Sum of numbers from 1 to 10 = " + sum);

    //mult tables
    let number = 5;
    for (let i = 1; i <= 10; i++) {
        console.log(number + " x " + i + " = " + (number * i));
    }

    //counting  numbers between 1 to 50
    let Count = 0;
    firstNO = 1;
    lastNO = 50;
    for (let i = firstNO; i <= lastNO; i++) {
        Count++;
    }
    console.log("Count of numbers from " + firstNO + " to " + lastNO + " = " + Count);

    //sum of even numbers between 1 to 20
    let evenSum = 0;
    for (let i = 1; i <= 20; i++) {
        if (i % 2 === 0) {
            evenSum += i;
        }
    }
    console.log("Sum of even numbers from 1 to 20 = " + evenSum);

    //squares of numbers from 1 to 10
    for (let i = 1; i <= 10; i++) {
        console.log("Square of " + i + " = " + (i * i));
    }

    //print stars in pattern
    let rows = 5;
    for (let i = 1; i <= rows; i++) {
        let stars = "";
        for (let j = 1; j <= i; j++) {
            stars += "* ";
            
        }
        console.log(stars);
    }

    //divisible by 3 between 1 to 30
    for (let i = 1; i <= 30; i++) {
        if (i % 3 === 0) {
            console.log(i + " is divisible by 3");
        }
    }

</script>
