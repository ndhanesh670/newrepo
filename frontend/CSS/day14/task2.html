<!DOCTYPE html>
<html>

<head>
    <style>


        .products {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            padding: 30px;
        }

        .card {
            border: 1px solid #ddd;
            padding: 10px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            transition: 0.3s;
        }

        .card img {
            padding: 10px;
            width: 100%;
            height: 200px;
            
        }

        .card:hover {
            transform: scale(1.05);
        }

        button {
            padding: 8px 15px;
            border: none;
            background: #243b55;
            color: white;
            cursor: pointer;
        }


        @media (max-width:600px) {

            .products {
                grid-template-columns: 1fr;
            }

        }
    </style>
</head>

<body>

    <section class="products">

        <div class="card">
            <img src="https://picsum.photos/300/200">
            <h3>Product 1</h3>
            <p>Description</p>
            <button>Buy</button>
        </div>

        <div class="card">
            <img src="https://picsum.photos/300/201">
            <h3>Product 2</h3>
            <p>Description</p>
            <button>Buy</button>
        </div>

        <div class="card">
            <img src="https://picsum.photos/300/202">

            <button>Buy</button>
        </div>

        <div class="card">
            <img src="https://picsum.photos/300/203">

            <p>Description</p>
            <button>Buy</button>
        </div>

        <div class="card">
            <img src="https://picsum.photos/300/204">
            <h3>Product 5</h3>
            <p>Description</p>
            <button>Buy</button>
        </div>

        <div class="card">
            <img src="https://picsum.photos/300/205">
            <h3>Product 6</h3>
            <p>Description</p>
            <button>Buy</button>
        </div>

    </section>

</body>

</html>
