<!DOCTYPE html>
<html>

<head>
    <style>
        .gallery {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            padding: 20px;
        }

        .img-box {
            position: relative;
            overflow: hidden;
        }

        .img-box img {
            width: 100%;
            display: block;
            transition: 0.4s;
        }

        .img-box:hover img {
            transform: scale(1.1);
        }

        .img-box::after {
            content: "Image";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: 0.3s;
        }

        .img-box:hover::after {
            opacity: 1;
        }
    </style>
</head>

<body>

    <div class="gallery">

        <div class="img-box"><img src="https://picsum.photos/300/200"></div>
        <div class="img-box"><img src="https://picsum.photos/301/200"></div>
        <div class="img-box"><img src="https://picsum.photos/302/200"></div>
        <div class="img-box"><img src="https://picsum.photos/303/200"></div>
        <div class="img-box"><img src="https://picsum.photos/304/200"></div>
        <div class="img-box"><img src="https://picsum.photos/305/200"></div>

    </div>

</body>

</html>
