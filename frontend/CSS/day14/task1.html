<!DOCTYPE html>
<html>

<head>
    <style>
        body {
            margin: 0;
            font-family: Arial;
        }

        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #243b55;
            padding: 15px 30px;
        }

        .logo {
            color: white;
            font-size: 20px;
            font-weight: bold;
        }

        .menu {
            display: flex;
            gap: 20px;
        }

        .menu a {
            color: white;
            text-decoration: none;
            transition: 0.3s;
        }

        .menu a:hover {
            color: #5f9ea0;
        }

        

        @media (max-width:600px) {

            .menu {
                flex-direction: column;
                background: #243b55;
                width: 100%;
                margin-top: 10px;
            }

            .navbar {
                flex-direction: column;
                align-items: flex-start;
            }

        }
    </style>
</head>

<body>

    <nav class="navbar">

        <div class="logo">MyLogo</div>

        <div class="menu">
            <a href="#">Home</a>
            <a href="#">About</a>
            <a href="#">Gallery</a>
            <a href="#">Contact</a>
        </div>

    </nav>

</body>

</html>
