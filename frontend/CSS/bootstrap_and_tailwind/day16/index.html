<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>day14</title>


    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>


    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top px-3">
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/c/c1/Google_%22G%22_logo.svg/3840px-Google_%22G%22_logo.svg.png"
            width="40">

        <div class="ms-3 d-flex gap-3">
            <a class="nav-link text-white" href="#home">Home</a>
            <a class="nav-link text-white" href="#">About</a>
            <a class="nav-link text-white" href="#gallery">Gallery</a>
        </div>

    </nav>



    <section id="home"

        style="background: linear-gradient(135deg, #243b55, #3a6073, #5f9ea0);">

        <h1 class="display-4 fw-bold">Healthy Food Delivered Fast 🥗</h1>
        <p class="lead">Fresh salads and nutritious bowls delivered to your door.</p>

        <div class="mt-3">
            <button class="btn btn-light me-2">Order Now</button>
            <button class="btn btn-outline-light">View Menu</button>
        </div>

    </section>



    <section id="gallery" class="py-5" style="background: linear-gradient(135deg, #243b55, #3a6073, #5f9ea0);">

        <div class="container">
            <div class="row g-4">


                <div class="col-md-4">
                    <div class="card h-100 shadow">
                        <img src="https://images.unsplash.com/photo-1546069901-ba9599a7e63c" class="card-img-top">

                        <div class="card-body text-center">
                            <h5 class="card-title">Fresh Salad</h5>
                            <p class="card-text">Healthy green salad made with fresh vegetables.</p>
                            <button class="btn btn-primary">Order Now</button>
                        </div>
                    </div>
                </div>


                <div class="col-md-4">
                    <div class="card h-100 shadow">
                        <img src="https://images.unsplash.com/photo-1512621776951-a57141f2eefd" class="card-img-top">

                        <div class="card-body text-center">
                            <h5 class="card-title">Delicious Bowl</h5>
                            <p class="card-text">Nutritious grain bowl with toppings.</p>
                            <button class="btn btn-primary">Order Now</button>
                        </div>
                    </div>
                </div>


                <div class="col-md-4">
                    <div class="card h-100 shadow">
                        <img src="https://images.unsplash.com/photo-1490645935967-10de6ba17061" class="card-img-top">

                        <div class="card-body text-center">
                            <h5 class="card-title">Healthy Wrap</h5>
                            <p class="card-text">Delicious wrap with fresh ingredients.</p>
                            <button class="btn btn-primary">Order Now</button>
                        </div>
                    </div>
                </div>

            </div>
        </div>
