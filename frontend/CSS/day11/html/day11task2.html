<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grid Gallery</title>

<style>

.parent{
    background-color: black;
    min-height: 100vh;
    gap: 10px;
    padding: 10px;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    align-content: center;
    justify-items: center;

}

.parent img{
    width: 300px;
    height: 200px;
    
}

</style>
</head>
