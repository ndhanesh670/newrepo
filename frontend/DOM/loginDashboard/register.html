<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #0f172a, #1e293b);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    color: white;
}

.card {
    background: #111827;
    padding: 35px;
    border-radius: 12px;
    width: 320px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.6);
}

h2 {
    text-align: center;
    margin-bottom: 25px;
}

.input-group {
    margin-bottom: 15px;
}

input {
    width: 100%;
    padding: 12px;
    border-radius: 6px;
    border: 1px solid #374151;
    background: #1f2937;
    color: white;
    outline: none;
}

input:focus {
    border-color: #22c55e;
}

button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    background: #22c55e;
    border: none;
    border-radius: 6px;
    color: white;
    font-weight: bold;
    cursor: pointer;
}

button:hover {
    background: #16a34a;
}

.link {
    text-align: center;
    margin-top: 15px;
    font-size: 14px;
}

.link a {
    color: #4ade80;
    text-decoration: none;
}

.link a:hover {
    text-decoration: underline;
}
</style>
</head>

<body>

<div class="card">
    <h2>Create Account</h2>

    <form id="form">
        <div class="input-group">
            <input id="name" type="text" placeholder="Username">
        </div>

        <div class="input-group">
            <input id="password" type="password" placeholder="Password">
        </div>

        <button type="submit">Register</button>
    </form>

    <div class="link">
        <p>Already have an account? <a href="login.html">Login</a></p>
    </div>
</div>

<script src="script.js"></script>

</body>
</html>
