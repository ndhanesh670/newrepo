<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="flex items-center flex-col">
    <!-- Heading -->
    <header>
        <h1>Midgard</h1>
    </header>

    <div class="bg-black flex flex-wrap justify-center items-center w-[500px]">
        <img src="Assets/Images/midgbanner.png" alt="">
    </div>

    <div>
        <div class=" flex flex-wrap justify-center items-center my-3 rounded-lg gap-5">
            <div class="w-86 h-80 border-2 p-2 flex flex-col gap-5 rounded-lg justify-between items-center bg-gray-300">
                <img class="w-[200px] rounded-lg" src="Assets/Images/Tyrstemple.png " alt="">
                <p>Tyr’s Temple – The Heart of the Lake of Nine</p>
                <button class=" w-20 bg-blue-700 text-white rounded-lg cursor-pointer">click</button>
            </div>

            <div
                class="w-86 h-80 border-2 p-2 flex flex-col gap-5 rounded-lg justify-between items-center  bg-gray-300">
                <img class="w-[200px] rounded-lg" src="Assets/Images/Tyrstemple.png " alt="">
                <p>Tyr’s Temple – The Heart of the Lake of Nine</p>
                <button class=" w-20 bg-blue-700 text-white rounded-lg cursor-pointer">click</button>
            </div>

            <div
                class="w-86 h-80 border-2 p-2 flex flex-col gap-5 rounded-lg justify-between items-center  bg-gray-300">
                <img class="w-[200px] rounded-lg" src="Assets/Images/Tyrstemple.png " alt="">
                <p>Tyr’s Temple – The Heart of the Lake of Nine</p>
                <button href="" class=" w-20 bg-blue-700 text-white rounded-lg cursor-pointer">click</button>
            </div>
        </div>
    </div>
    <script>
        let logout = document.getElementById("logout")
        logout.addEventListener("click", () => {
            localStorage.removeItem("loggedIn")
            window.location.href = "login.html"
        })
        let user = JSON.parse(localStorage.getItem("loggedIn"))
        if (!user) {
            window.location.href = "login.html"
        }
    </script>
</body>

</html>
